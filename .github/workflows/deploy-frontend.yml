name: Deploy Frontend to Cloud Run
on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: supply-491510
      REGION: us-central1
      SERVICE_NAME: taxalliance-web
      IMAGE: us-central1-docker.pkg.dev/supply-491510/taxalliance/frontend:latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build
        run: docker build -t ${{ env.IMAGE }} -f apps/web/Dockerfile apps/web
      - run: docker push ${{ env.IMAGE }}
      - name: Deploy
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }} --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated --min-instances=0 --max-instances=3 --cpu=1 --memory=512Mi --quiet
      - name: Verify
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --format="value(status.url)")
          echo "Deployed: $URL"
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" "$URL"
